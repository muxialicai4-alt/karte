<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ブライダルカルテ v4</title>
<script>
(function(){
  const HASH = '0b7e6f487250cc91289f11bdeda10f9dec28dfb4634432067c4bb88016aa5329';
  const KEY = 'bk_auth_v4';
  async function sha256(s){
    const b = new TextEncoder().encode(s);
    const h = await crypto.subtle.digest('SHA-256', b);
    return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  function showLock(){
    document.body.style.display='none';
    const d = document.createElement('div');
    d.id='lock-screen';
    d.style.cssText='position:fixed;inset:0;background:#faf5f7;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:-apple-system,sans-serif;';
    d.innerHTML=`
      <div style="text-align:center;padding:32px 24px;background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(180,100,130,.15);max-width:320px;width:90%">
        <div style="font-size:48px;margin-bottom:12px">💍</div>
        <div style="font-size:18px;font-weight:700;color:#2d2d2d;margin-bottom:4px">ブライダルカルテ</div>
        <div style="font-size:13px;color:#888;margin-bottom:24px">パスワードを入力してください</div>
        <input id="pw-input" type="password" placeholder="パスワード"
          style="width:100%;padding:12px 14px;border:1.5px solid #e8d4db;border-radius:10px;font-size:15px;outline:none;font-family:inherit;color:#2d2d2d;background:#fdf5f8;box-sizing:border-box;margin-bottom:12px">
        <button id="pw-btn"
          style="width:100%;padding:12px;background:linear-gradient(135deg,#e8a0b4,#c47f96);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">
          ひらく
        </button>
        <div id="pw-err" style="color:#e87070;font-size:12px;margin-top:10px;min-height:16px"></div>
      </div>`;
    document.body.parentNode.insertBefore(d, document.body);
    setTimeout(()=>document.getElementById('pw-input').focus(), 100);
    async function tryLogin(){
      const v = document.getElementById('pw-input').value;
      const h = await sha256(v);
      if(h===HASH){
        sessionStorage.setItem(KEY,'1');
        d.remove();
        document.body.style.display='';
      } else {
        document.getElementById('pw-err').textContent='パスワードが違います';
        document.getElementById('pw-input').value='';
        document.getElementById('pw-input').focus();
      }
    }
    document.getElementById('pw-btn').onclick = tryLogin;
    document.getElementById('pw-input').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
  }
  if(!sessionStorage.getItem(KEY)){
    if(document.body) showLock();
    else document.addEventListener('DOMContentLoaded', showLock);
  }
})();
</script>

:root{--p:#d4849e;--pl:#fdf5f8;--pm:#f5dce6;--pd:#b06580;--t:#2d2d2d;--tm:#888;--bd:#e8d4db}

body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:#faf5f7;color:var(--t);font-size:14px;line-height:1.6;-webkit-text-size-adjust:100%}

/* HEADER */

.btn-white{background:rgba(255,255,255,.92);color:var(--pd)}

/* PULL TO REFRESH */
.ptr{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:center;background:var(--pm);color:var(--pd);font-size:13px;font-weight:700;transform:translateY(-100%);transition:transform .2s;z-index:100;pointer-events:none}
.ptr.visible{transform:translateY(0)}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#333;color:#fff;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.lb img{max-width:100%;max-height:100%;border-radius:8px;object-fit:contain}
.lb-x{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}

  .sec,.hair{box-shadow:none;border:1px solid #ddd;margin:6px 0}
  body{background:#fff}
  .hero{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .himitsu-hide{display:none!important}
}
#file-input,#file-input-multi{display:none}

.btn-multi:active{opacity:.7}
</style>

      });
    }
    const s = localStorage.getItem('bridal_kartes_v4');
    const stored = s ? JSON.parse(s) : [];
    // PRELOAD_DATA を常にベースにし、アプリ側のメモ編集だけ引き継ぐ
    kartes = PRELOAD_DATA.kartes.map(pk => {
      const sk = stored.find(k => k.id === pk.id);
      return sk ? {...pk, f_memo: sk.f_memo !== undefined ? sk.f_memo : pk.f_memo} : {...pk};
    });
    stored.forEach(sk => {
      if (!kartes.find(k => k.id === sk.id)) kartes.push(sk);
    });
    save();
  } catch(e) {
    kartes = PRELOAD_DATA.kartes.map(k => ({...k}));
    save();
  }
}
function save() { localStorage.setItem('bridal_kartes_v4', JSON.stringify(kartes)); }
function getK(id) { return kartes.find(k => k.id === id); }
function saveK(k) {
  const i = kartes.findIndex(x => x.id === k.id);
  if (i >= 0) kartes[i] = k; else kartes.push(k);
  save();
}
function getPhoto(kid, pk) { return localStorage.getItem(kid + '__' + pk); }
function setPhoto(kid, pk, d) { localStorage.setItem(kid + '__' + pk, d); }
function delPhotoLS(kid, pk) { localStorage.removeItem(kid + '__' + pk); }

// ===== UTILS =====
function daysUntil(d) {
  if (!d) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const x = new Date(d); x.setHours(0,0,0,0);
  return Math.round((x - t) / 86400000);
}
function fmtDate(d) {
  if (!d) return '—';
  const x = new Date(d);
  const wd = ['日','月','火','水','木','金','土'];
  return `${x.getFullYear()}/${String(x.getMonth()+1).padStart(2,'0')}/${String(x.getDate()).padStart(2,'0')}（${wd[x.getDay()]}）`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function parseName(n) {
  const m = String(n||'').match(/^(.+?)（(.+?)）/);
  return m ? {name: m[1], furi: m[2]} : {name: n||'', furi: ''};
}

const GH_REPO = 'muxialicai4-alt/karte';
const GH_PATH = 'index.html';

function getGHToken() { return localStorage.getItem('gh_pat'); }

function showTokenSetup(onDone) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.18)">
      <div style="font-size:16px;font-weight:700;color:#2d2d2d;margin-bottom:8px">☁️ GitHub設定</div>
      <div style="font-size:12px;color:#888;margin-bottom:16px;line-height:1.6">GitHubのPersonal Access Tokenを入力してください。<br>一度入力すると次回から不要です。</div>
      <input id="gh-token-input" type="password" placeholder="ghp_..." autocomplete="off" autocorrect="off" spellcheck="false"
        style="width:100%;padding:11px 13px;border:1.5px solid #e8d4db;border-radius:10px;font-size:14px;font-family:monospace;outline:none;box-sizing:border-box;margin-bottom:12px;background:#fdf5f8">
      <div style="display:flex;gap:8px">
        <button id="gh-token-cancel" style="flex:1;padding:11px;border:1.5px solid #e8d4db;background:#fff;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#888">キャンセル</button>
        <button id="gh-token-save" style="flex:2;padding:11px;background:linear-gradient(135deg,#e8a0b4,#c47f96);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">保存して続ける</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('gh-token-input').focus(), 100);
  document.getElementById('gh-token-cancel').onclick = () => { overlay.remove(); };
  document.getElementById('gh-token-save').onclick = () => {
    const v = document.getElementById('gh-token-input').value.trim();
    if (!v) { document.getElementById('gh-token-input').style.borderColor='#e87070'; return; }
    localStorage.setItem('gh_pat', v);
    overlay.remove();
    if (onDone) onDone();

}

async function saveToGitHub() {
  const token = getGHToken();
  if (!token) { showTokenSetup(() => saveToGitHub()); return; }
  toast('☁️ GitHubへ保存中...');
  try {
    // 写真を全部収集
    const photos = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.includes('__')) {
        const v = localStorage.getItem(key);
        if (v && v.startsWith('data:image')) photos[key] = v;
      }
    }
    // 現在のHTMLを取得
    let src;
    try { src = await (await fetch(location.href)).text(); }
    catch(e) { src = '<!DOCTYPE html>\n' + document.documentElement.outerHTML; }
    const newD = `/* PRELOAD_START */\nconst PRELOAD_DATA = ${JSON.stringify({kartes, photos, version:4})};\n/* PRELOAD_END */`;
    const updated = src.replace(/\/\* PRELOAD_START \*\/[\s\S]*?\/\* PRELOAD_END \*\//, newD);
    // UTF-8 → base64
    const bytes = new TextEncoder().encode(updated);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    const encoded = btoa(binary);
    // 現在のSHAを取得
    const metaResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_PATH}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!metaResp.ok) {
      if (metaResp.status === 401) { localStorage.removeItem('gh_pat'); throw new Error('トークンが無効です。再設定してください。'); }
      throw new Error('SHA取得失敗: ' + metaResp.status);
    }
    const meta = await metaResp.json();
    // プッシュ
    const pushResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_PATH}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message: 'Update karte', content: encoded, sha: meta.sha })
    });
    if (!pushResp.ok) {
      const err = await pushResp.json();
      throw new Error(err.message || pushResp.status);
    }
    const pc = Object.keys(photos).length;
    toast(`✅ 保存完了！（写真${pc}枚）約1分後に反映されます`);
  } catch(e) { toast('❌ エラー: ' + e.message); }
}

function exportPDFData() {
  toast('📦 PDF用データ書き出し中...');
  try {

    const targetKartes = currentId ? [getK(currentId)] : kartes;

    })();
    const a = document.createElement('a');

// ===== SECTION HELPERS =====
function sec(title, body) {
  if (!body || !body.trim()) return '';
  return `<div class="sec"><div class="sec-hd">${title}</div><div class="sec-body">${body}</div></div>`;
}
function fr(label, value) {
  if (!value && value !== 0) return '';
  return `<div class="fr"><span class="fl">${label}</span><span class="fv">${esc(value)}</span></div>`;
}
function frb(label, html) { // for badge/HTML content
  if (!html) return '';
  return `<div class="fr"><span class="fl">${label}</span><span class="fv" style="white-space:normal">${html}</span></div>`;
}

function hairBlock(num, k) {
  const p = num === 1 ? 'h1' : num === 2 ? 'h2' : 'h3';
  const labels = {1:'① 挙式',2:'② 披露宴入場',3:'③ お色直し'};
  const colors = {1:'hc1',2:'hc2',3:'hc3'};
  const himitsu = num === 1 && k.h1_himitsu;

  const head    = k[`f_${p}_head`];
  const maegami = k[`f_${p}_maegami`];
  const k26     = k[`${p}_kote26`];
  const k32     = k[`${p}_kote32`];
  const img     = k[`f_${p}_img`];
  const bouquet = k[`f_${p}_bouquet`];
  const taste   = k[`f_${p}_taste`];
  const make    = num > 1 ? k[`f_${p}_make`] : null;
  const cheek   = k[`f_cheek${num}`];
  const lip     = k[`f_lip${num}`];

  const mkc = {cheek:k[`f_mk${num}_cheek`], lip:k[`f_mk${num}_lip`], eye:k[`f_mk${num}_eye`], other:k[`f_mk${num}_other`]};
  const hasMk = num > 1 && (mkc.cheek || mkc.lip || mkc.eye || mkc.other);

  const photoKeys = [`${p}p1`,`${p}p2`,`${p}p3`,`${p}p4`,`${p}p5`,`${p}p6`];
  if (num > 1) photoKeys.unshift(`${p}cosme`);

  const hasAny = head||maegami||img||make||taste||cheek||lip||k26||k32;
  if (!hasAny) return '';

  let body = `<div class="hair-body${himitsu?' himitsu-hide':''}">`;
  if (make) body += fr('メイクチェンジ', make);
  if (head) body += fr('頭飾り', head);
  if (maegami) body += fr('前髪', maegami);
  if (k26 || k32) body += frb('コテ', [k26&&'<span class="badge bb">26mm</span>', k32&&'<span class="badge bb">32mm</span>'].filter(Boolean).join(' '));
  if (img) body += fr('スタイル', img);
  if (bouquet) body += fr('ブーケ', bouquet);
  if (taste) body += fr('テイスト', taste);

  if (cheek || lip) {
    body += `<div class="sec-body" style="padding:8px 0 2px"><div class="hair-sub">チーク・リップ</div></div>`;
    if (cheek) body += fr('チーク', cheek);
    if (lip)   body += fr('リップ', lip);
  }

  if (hasMk) {
    body += `<div class="sec-body" style="padding:8px 0 2px"><div class="hair-sub">メイクチェンジ詳細</div></div>`;
    if (mkc.cheek) body += fr('チーク', mkc.cheek);
    if (mkc.lip)   body += fr('リップ', mkc.lip);
    if (mkc.eye)   body += fr('アイ', mkc.eye);
    if (mkc.other) body += fr('その他', mkc.other);
  }

  body += photoGrid(k.id, photoKeys, '参考写真');
  body += '</div>';

  return `<div class="hair" style="margin:11px 11px 0">
    <div class="hair-hd ${colors[num]}">
      <span>${labels[num]}</span>
      ${himitsu ? '<span style="font-size:11px;opacity:.8">🔒 非公開</span>' : ''}
    </div>${body}</div>`;
}

function photoGrid(karteId, keys, label) {
  const kidSafe = esc(karteId);
  const keysSafe = esc(JSON.stringify(keys));
  const slots = keys.map(pk => {
    const d = getPhoto(karteId, pk);
    const pkSafe = esc(pk);
    if (d) return `<div class="photo-slot">
      <img src="${d}" alt="" onclick="openLb('${kidSafe}','${pkSafe}')">
      <button class="photo-del" onclick="event.stopPropagation();rmPhoto('${kidSafe}','${pkSafe}')">×</button>
    </div>`;
    return `<div class="photo-slot" onclick="pickPhoto('${kidSafe}','${pkSafe}')">
      <span class="photo-add">＋</span>
    </div>`;
  }).join('');
  return `<div class="no-print" style="padding:0">
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0 4px">
      <span style="font-size:11px;font-weight:700;color:var(--tm)">${label}</span>
      <button class="btn-multi" onclick="pickMulti('${kidSafe}','${keysSafe}')">📷 まとめて追加</button>
    </div>
    <div class="photo-grid">${slots}</div>
  </div>`;
}

// ===== PHOTO =====
function pickPhoto(karteId, photoKey) {
  pendingPhoto = {karteId, photoKey};
  const f = document.getElementById('file-input');
  f.value = ''; f.click();
}

let pendingMulti = null; // {karteId, keys}
function pickMulti(karteId, keysJson) {
  pendingMulti = {karteId, keys: JSON.parse(keysJson)};
  const f = document.getElementById('file-input-multi');
  f.value = ''; f.click();
}
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file || !pendingPhoto) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const max = 800;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h*max/w); w = max; }
        else { w = Math.round(w*max/h); h = max; }
      }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      setPhoto(pendingPhoto.karteId, pendingPhoto.photoKey, c.toDataURL('image/jpeg', 0.7));
      pendingPhoto = null;
      render();
      toast('📷 写真を保存しました');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
document.getElementById('file-input-multi').addEventListener('change', function(e) {
  const files = Array.from(e.target.files);
  if (!files.length || !pendingMulti) return;
  const {karteId, keys} = pendingMulti;
  // 空きスロットを取得
  const emptyKeys = keys.filter(pk => !getPhoto(karteId, pk));
  const targets = emptyKeys.length > 0 ? emptyKeys : keys;
  let done = 0;
  const total = Math.min(files.length, targets.length);
  files.slice(0, total).forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        const max = 800;
        let w = img.width, h = img.height;
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h*max/w); w = max; }
          else { w = Math.round(w*max/h); h = max; }
        }
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        setPhoto(karteId, targets[i], c.toDataURL('image/jpeg', 0.7));
        done++;
        if (done === total) {
          pendingMulti = null;
          render();
          toast(`📷 ${total}枚の写真を保存しました`);
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
});

function rmPhoto(karteId, photoKey) {
  if (!confirm('この写真を削除しますか？')) return;
  delPhotoLS(karteId, photoKey); render();
}
function openLb(karteId, photoKey) {
  const d = getPhoto(karteId, photoKey);
  if (!d) return;
  document.getElementById('lb-img').src = d;
  document.getElementById('lb').style.display = 'flex';
}
function closeLb() { document.getElementById('lb').style.display = 'none'; }
document.getElementById('lb').addEventListener('click', e => { if (e.target===e.currentTarget) closeLb(); });

// ===== MEMO =====
function saveMemo(v) {
  const k = getK(currentId); if (!k) return;
  k.f_memo = v; saveK(k);
}

// ===== PULL TO REFRESH =====
(function(){
  let startY = 0, pulling = false;
  const ptr = document.getElementById('ptr');
  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, {passive: true});
  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 45) ptr.classList.add('visible');
    else ptr.classList.remove('visible');
  }, {passive: true});
  document.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    if (ptr.classList.contains('visible')) {
      ptr.textContent = '🔄 更新中...';
      setTimeout(() => location.reload(), 300);
    }
    ptr.classList.remove('visible');
  });
})();

// ===== INIT =====
loadData();
render();
</script>
